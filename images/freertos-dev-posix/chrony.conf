# Chrony NTP Server Configuration for Development Container
#
# This configuration sets up chronyd as both an NTP client and server
# for testing FreeRTOS NTP client implementations

# Use public NTP servers for synchronization
pool 2.debian.pool.ntp.org iburst
pool time.google.com iburst

# Record the rate at which the system clock gains/loses time
driftfile /var/lib/chrony/drift

# Allow the system clock to be stepped if the adjustment is larger than 1 second
makestep 1.0 3

# Enable kernel synchronization of the real-time clock (RTC)
rtcsync

# Serve time even if not synchronized to upstream servers
# This allows local testing without internet connectivity
local stratum 10

# Allow NTP client access from local network
# Allow access from container network (typically 172.17.0.0/16)
allow 172.16.0.0/12
allow 192.168.0.0/16
allow 10.0.0.0/8
# Allow localhost
allow 127.0.0.1
allow ::1

# Listen on all interfaces
bindaddress 0.0.0.0
bindaddress ::

# Log statistics
logdir /var/log/chrony
log measurements statistics tracking

# Disable command port for security (not needed in dev container)
cmdallow 127.0.0.1
cmdallow ::1

# Step the system clock instead of slewing it if the adjustment is larger than 1 second
# but only in the first three updates
makestep 1 3

# Increase the minimum number of selectable sources required to adjust the system clock
# minsources 2

# Enable NTS (Network Time Security) support if available
# Uncomment the following lines to enable NTS
# ntsserverkey /etc/chrony/server.key
# ntsservercert /etc/chrony/server.crt
