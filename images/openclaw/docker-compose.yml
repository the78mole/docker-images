version: '3.8'

services:
  openclaw:
    image: ghcr.io/the78mole/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - openclaw-data:/home/ubuntu/.openclaw
      - openclaw-workspace:/home/ubuntu/.openclaw/workspace
    environment:
      # Set your AI provider API keys here
      # For Anthropic (Claude):
      # - ANTHROPIC_API_KEY=your-api-key-here
      # For OpenAI (GPT):
      # - OPENAI_API_KEY=your-api-key-here
      # For other providers, see https://docs.openclaw.ai
      - OPENCLAW_HOME=/home/ubuntu/.openclaw
    # Uncomment to run onboarding instead of gateway
    # command: ["npm", "run", "onboard"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  openclaw-data:
    driver: local
  openclaw-workspace:
    driver: local
